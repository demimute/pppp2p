name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies for bundled backend
        run: python -m pip install --upgrade pip && pip install -r backend/requirements-win.txt

      - name: Build bundled Windows backend
        run: pyinstaller --clean --noconfirm --onedir --name backend backend/app.py

      - name: Place bundled backend for Electron packaging
        run: |
          Remove-Item backend/backend -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path backend/backend | Out-Null
          Copy-Item dist/backend/* backend/backend/ -Recurse -Force
        shell: pwsh

      - name: Verify bundled backend before Electron packaging
        run: |
          $paths = @(
            'dist/backend/backend.exe',
            'backend/backend/backend.exe'
          )
          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing expected backend artifact: $path"
            }
            Write-Host "Found $path ($(Get-Item $path).Length bytes)"
          }
          Get-ChildItem -Recurse backend/backend | Select-Object FullName, Length
        shell: pwsh

      - name: Build Windows portable and NSIS
        run: npm run build:electron:win

      - name: Verify packaged backend in win-unpacked resources
        run: |
          $paths = @(
            'dist-electron/win-unpacked/resources/backend/backend/backend.exe',
            'dist-electron/win-unpacked/resources/app.asar'
          )
          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing expected packaged file: $path"
            }
            Write-Host "Found $path ($(Get-Item $path).Length bytes)"
          }
          Get-ChildItem -Recurse dist-electron/win-unpacked/resources | Select-Object FullName, Length
        shell: pwsh

      - name: Smoke test packaged backend on Windows runner
        run: |
          $exe = Resolve-Path 'dist-electron/win-unpacked/resources/backend/backend/backend.exe'
          $stdout = Join-Path $env:RUNNER_TEMP 'backend-stdout.log'
          $stderr = Join-Path $env:RUNNER_TEMP 'backend-stderr.log'
          $env:DEDUP_BACKEND_PORT = '18765'
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          try {
            $ready = $false
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 1
              try {
                $resp = Invoke-WebRequest -Uri 'http://127.0.0.1:18765/api/health' -UseBasicParsing -TimeoutSec 2
                if ($resp.StatusCode -eq 200) {
                  $ready = $true
                  Write-Host $resp.Content
                  break
                }
              } catch {
              }
              if ($proc.HasExited) {
                break
              }
            }
            if (-not $ready) {
              if (-not $proc.HasExited) {
                Stop-Process -Id $proc.Id -Force
              }
              Write-Host '--- backend stdout ---'
              if (Test-Path $stdout) { Get-Content $stdout }
              Write-Host '--- backend stderr ---'
              if (Test-Path $stderr) { Get-Content $stderr }
              throw 'Packaged backend failed smoke test on Windows runner'
            }
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }
        shell: pwsh

      - name: Archive unpacked portable directory
        run: Compress-Archive -Path dist-electron/win-unpacked/* -DestinationPath dist-electron/PPPP2P-win-x64-unpacked.zip
        shell: pwsh

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PPPP2P-win-x64-build
          path: |
            dist-electron/*.exe
            dist-electron/PPPP2P-win-x64-unpacked.zip
            dist-electron/*.yml
          if-no-files-found: warn
