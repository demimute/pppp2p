name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies for bundled backend
        run: python -m pip install --upgrade pip && pip install -r backend/requirements-win.txt

      - name: Build bundled Windows backend
        run: pyinstaller --clean --noconfirm --onefile --name backend backend/app.py

      - name: Place bundled backend for Electron packaging
        run: Copy-Item dist/backend.exe backend/backend.exe -Force
        shell: pwsh

      - name: Build Windows portable and NSIS
        run: npm run build:electron:win

      - name: Archive unpacked portable directory
        run: Compress-Archive -Path dist-electron/win-unpacked/* -DestinationPath dist-electron/PPPP2P-win-x64-unpacked.zip
        shell: pwsh

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PPPP2P-win-x64-build
          path: |
            dist-electron/*.exe
            dist-electron/PPPP2P-win-x64-unpacked.zip
            dist-electron/*.yml
          if-no-files-found: warn
