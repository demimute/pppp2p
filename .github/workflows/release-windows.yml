name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies for bundled backend
        run: python -m pip install --upgrade pip && pip install -r backend/requirements-win.txt

      - name: Download bundled CLIP weights
        run: |
          python - <<'PY'
          from pathlib import Path
          from huggingface_hub import hf_hub_download
          target = Path('backend/model')
          target.mkdir(parents=True, exist_ok=True)
          src = hf_hub_download(repo_id='timm/vit_base_patch32_clip_224.openai', filename='open_clip_model.safetensors')
          Path(target / 'open_clip_model.safetensors').write_bytes(Path(src).read_bytes())
          print(target / 'open_clip_model.safetensors')
          PY

      - name: Build bundled Windows backend
        run: pyinstaller --clean --noconfirm --onedir --collect-data open_clip --name backend backend/app.py

      - name: Place bundled backend for Electron packaging
        run: |
          Remove-Item backend/backend -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path backend/backend | Out-Null
          Copy-Item dist/backend/* backend/backend/ -Recurse -Force
        shell: pwsh

      - name: Verify bundled backend before Electron packaging
        run: |
          $paths = @(
            'dist/backend/backend.exe',
            'backend/backend/backend.exe',
            'backend/model/open_clip_model.safetensors'
          )
          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing expected backend artifact: $path"
            }
            Write-Host "Found $path ($(Get-Item $path).Length bytes)"
          }
          Get-ChildItem -Recurse backend/backend | Select-Object FullName, Length
        shell: pwsh

      - name: Build Windows portable and NSIS
        run: npm run build:electron:win

      - name: Verify packaged backend in win-unpacked resources
        run: |
          $paths = @(
            'dist-electron/win-unpacked/resources/backend/backend/backend.exe',
            'dist-electron/win-unpacked/resources/backend/model/open_clip_model.safetensors',
            'dist-electron/win-unpacked/resources/app.asar'
          )
          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing expected packaged file: $path"
            }
            Write-Host "Found $path ($(Get-Item $path).Length bytes)"
          }
          Get-ChildItem -Recurse dist-electron/win-unpacked/resources | Select-Object FullName, Length
        shell: pwsh

      - name: Archive unpacked portable directory
        run: Compress-Archive -Path dist-electron/win-unpacked/* -DestinationPath dist-electron/PPPP2P-win-x64-unpacked.zip
        shell: pwsh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/PPPP2P-win-x64-unpacked.zip
            docs/windows-portable-readme.txt
          generate_release_notes: true
